<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0e12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Best Fights — Treadmill Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>Best Fights</h1>
        <p class="tagline">~100 classics for the treadmill — no spoilers</p>
      </div>
      <div class="header-actions">
        <div class="auth-bar" id="auth-bar" aria-live="polite"></div>
        <div class="stats-scroll">
          <div class="stats" id="stats"></div>
        </div>
      </div>
    </div>
  </header>

  <div class="mobile-toolbar" id="mobile-toolbar" aria-label="Quick actions">
    <button
      type="button"
      class="mobile-tool-btn touch-target"
      id="mobile-run-toggle"
      aria-expanded="false"
      aria-controls="run-time-panel"
    >
      <span class="mobile-tool-icon" aria-hidden="true">⏱</span>
      <span class="mobile-tool-label" id="mobile-run-label">Run time</span>
    </button>
    <button
      type="button"
      class="mobile-tool-btn touch-target"
      id="mobile-filters-toggle"
      aria-expanded="false"
      aria-controls="filters-drawer"
    >
      <span class="mobile-tool-icon" aria-hidden="true">☰</span>
      <span class="mobile-tool-label">Filters</span>
      <span class="mobile-tool-badge hidden" id="mobile-filter-badge" aria-label="Active filters"></span>
    </button>
  </div>

  <main class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-card run-time-panel" id="run-time-panel">
        <label for="run-time">Run time</label>
        <p class="run-time-hint">How long is your treadmill session?</p>
        <div class="run-time-presets" role="group" aria-label="Run time presets">
          <button type="button" class="run-preset touch-target" data-minutes="20">20 min</button>
          <button type="button" class="run-preset touch-target" data-minutes="25">25 min</button>
          <button type="button" class="run-preset touch-target" data-minutes="30">30 min</button>
        </div>
        <div class="run-time-input-row">
          <input type="number" id="run-time" class="touch-input" min="5" max="90" step="1" placeholder="Minutes" inputmode="numeric">
          <button type="button" class="btn-run-find touch-target" id="run-find">Find fights</button>
        </div>
        <div class="run-time-actions">
          <button type="button" class="btn-clear-run touch-target hidden" id="clear-run">Clear run time</button>
          <button type="button" class="btn-run-refresh touch-target hidden" id="run-refresh" title="Show different fight picks">New picks ↻</button>
        </div>
      </div>

      <div class="filters-drawer" id="filters-drawer">
        <div class="sidebar-card watched-filter-group">
          <label class="watched-filter-label touch-target">
            <input type="checkbox" id="hide-watched">
            Hide watched fights
          </label>
          <p class="watched-progress" id="watched-progress"></p>
          <button type="button" class="btn-reset-watched touch-target" id="reset-watched">Clear watched list</button>
        </div>

        <div class="sidebar-card filters-panel">
        <div class="filter-group">
          <label for="search">Search</label>
          <input type="search" id="search" class="touch-input" placeholder="Fighter, event…" autocomplete="off">
        </div>

        <div class="filter-group">
          <label for="sport">Combat type</label>
          <select id="sport" class="touch-input">
            <option value="all">All types</option>
            <option value="boxing">Boxing</option>
            <option value="mma">MMA</option>
            <option value="kickboxing">Kickboxing</option>
            <option value="muay thai">Muay Thai</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="duration">Duration</label>
          <select id="duration" class="touch-input">
            <option value="all">Any length</option>
            <option value="short">Under 20 min</option>
            <option value="medium">20–35 min</option>
            <option value="long">35+ min</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="ending">How it ends</label>
          <select id="ending" class="touch-input">
            <option value="all">Any ending</option>
            <option value="ko">KO / TKO</option>
            <option value="submission">Submission</option>
            <option value="decision">Decision</option>
            <option value="draw">Draw / No contest</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="sort">Sort by</label>
          <select id="sort" class="touch-input">
            <option value="year-desc">Year (newest)</option>
            <option value="year-asc">Year (oldest)</option>
            <option value="duration-asc">Duration (shortest)</option>
            <option value="duration-desc">Duration (longest)</option>
            <option value="fighters">Fighters (A–Z)</option>
          </select>
        </div>

        <button type="button" class="btn-reset touch-target" id="reset">Clear filters</button>
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="run-recommendations hidden" id="run-recommendations"></div>
      <p class="results-count" id="results-count"></p>
      <div class="fight-grid" id="fight-grid"></div>
      <p class="empty-state hidden" id="empty-state">No fights match your filters.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Winner intentionally omitted. Verify links before your run — uploads change over time.</p>
  </footer>

  <script src="js/app.js" type="module"></script>
</body>
</html>
